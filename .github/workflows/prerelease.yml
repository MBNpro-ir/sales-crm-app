name: Pre-release 0.0.4-alpha (Windows)

run-name: Windows pre-release from ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: prerelease-v0.0.4-alpha
  cancel-in-progress: true

jobs:
  build-windows:
    name: Test and build Windows app plus updater
    runs-on: windows-latest
    timeout-minutes: 55

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Flutter with SDK and Pub caching
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
          pub-cache: true
          # These are the action's documented defaults, pinned explicitly so
          # the existing 3.44.6 SDK and Pub caches are reused.
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-key: "flutter-pub-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Set up .NET SDK cache
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        run: >-
          flutter build windows --release
          --build-name=0.0.4
          --build-number=${{ github.run_number }}
          --dart-define=APP_VERSION=0.0.4-alpha
          --dart-define=BUILD_SHA=${{ github.sha }}
          --dart-define=UPDATE_REPOSITORY=${{ github.repository }}

      - name: Build standalone updater
        shell: pwsh
        run: >-
          dotnet publish updater/SalesCrmUpdater.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output build/updater

      - name: Include updater with CRM
        shell: pwsh
        run: >-
          Copy-Item build/updater/sales_crm_updater.exe
          build/windows/x64/runner/Release/sales_crm_updater.exe -Force

      - name: Package Windows release
        shell: pwsh
        run: |
          $package = Join-Path $env:GITHUB_WORKSPACE 'sales-crm-windows-0.0.4-alpha.zip'
          if (Test-Path -LiteralPath $package) {
            Remove-Item -LiteralPath $package -Force
          }
          Compress-Archive `
            -Path (Join-Path $env:GITHUB_WORKSPACE 'build\windows\x64\runner\Release\*') `
            -DestinationPath $package `
            -CompressionLevel Optimal

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            sales-crm-windows-0.0.4-alpha.zip
            build/updater/sales_crm_updater.exe
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub pre-release
    needs: build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows release assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release-assets
          path: dist

      - name: Create or move release tag
        env:
          TAG: v0.0.4-alpha
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch --tags origin
          git tag -fa "$TAG" "$GITHUB_SHA" -m "Sales CRM $TAG"
          git push origin "refs/tags/$TAG" --force

      - name: Create or update pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.0.4-alpha
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # upload-artifact preserves a nested path for the updater. Search the
          # complete downloaded artifact instead of assuming both assets are at
          # the root of dist.
          package="$(find dist -type f -name '*.zip' -print -quit)"
          updater="$(find dist -type f -name 'sales_crm_updater.exe' -print -quit)"
          test -n "$package"
          test -n "$updater"
          sha="$(sha256sum "$package" | awk '{print $1}')"
          sha256sum "$package" "$updater" > dist/SHA256SUMS.txt
          package_name="$(basename "$package")"
          cat > dist/sales-crm-update.json <<EOF
          {
            "version": "0.0.4-alpha",
            "build_sha": "$SHA",
            "package_url": "https://github.com/$REPOSITORY/releases/download/$TAG/$package_name",
            "sha256": "$sha"
          }
          EOF
          notes="Automated Windows pre-release for 0.0.4-alpha.

          Commit: $SHA
          Workflow run: $RUN_ID
          Includes the standalone Windows updater and an update manifest."

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title 'Sales CRM 0.0.4-alpha' --notes "$notes" --prerelease --target "$SHA"
            gh release upload "$TAG" "$package" "$updater" dist/SHA256SUMS.txt dist/sales-crm-update.json --clobber
          else
            gh release create "$TAG" "$package" "$updater" dist/SHA256SUMS.txt dist/sales-crm-update.json \
              --title 'Sales CRM 0.0.4-alpha' --notes "$notes" --prerelease --latest=false --verify-tag
          fi
